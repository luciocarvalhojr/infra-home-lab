---
- name: Apply common configuration to all nodes
  hosts: k3s_cluster
  become: true
  roles:
    - common

- name: Install k3s control plane
  hosts: controlplane
  become: true
  vars:
    k3s_version: "v1.34.5+k3s1"  # pin to your current version
  roles:
    - k3s_server

- name: Join worker nodes to cluster
  hosts: workers
  become: true
  vars:
    k3s_version: "v1.34.5+k3s1"
    controlplane_ip: "{{ hostvars[groups['controlplane'][0]]['ansible_host'] }}"
  roles:
    - k3s_agent
