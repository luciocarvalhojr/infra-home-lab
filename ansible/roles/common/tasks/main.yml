---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - vim
      - git
      - htop
      - net-tools
      - qemu-guest-agent
      - open-iscsi        # required for some k3s storage drivers
      - nfs-common        # required for NFS CSI driver
    state: present

- name: Enable and start qemu-guest-agent
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: Disable swap permanently
  ansible.builtin.shell: |
    swapoff -a
    sed -i '/swap/d' /etc/fstab
  changed_when: false

- name: Load required kernel modules
  ansible.builtin.command: modprobe {{ item }}
  loop:
    - br_netfilter
    - overlay
  changed_when: false

- name: Persist kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    mode: "0644"
    content: |
      br_netfilter
      overlay

- name: Write sysctl params for Kubernetes networking
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-k3s.conf
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

- name: Apply sysctl params
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Reboot if required
  ansible.builtin.reboot:
    reboot_timeout: 120
  when: ansible_facts.get('reboot_required', false)
