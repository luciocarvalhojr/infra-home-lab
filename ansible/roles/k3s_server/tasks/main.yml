---
- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_server_binary

- name: Download k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: "0755"
  when: not k3s_server_binary.stat.exists

- name: Install k3s control plane
  ansible.builtin.command:
    cmd: >-
      /tmp/k3s-install.sh server
      --cluster-init
      --disable servicelb
      --write-kubeconfig-mode 644
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
  when: not k3s_server_binary.stat.exists
  changed_when: not k3s_server_binary.stat.exists

- name: Wait for k3s to be ready
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 60

- name: Fetch node token for workers
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_server_node_token

- name: Set node token fact
  ansible.builtin.set_fact:
    k3s_server_token: "{{ k3s_server_node_token.content | b64decode | trim }}"
