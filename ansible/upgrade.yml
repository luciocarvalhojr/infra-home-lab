---
# Usage: ansible-playbook upgrade.yml -e k3s_version=v1.35.0+k3s1
- name: Upgrade k3s control plane
  hosts: controlplane
  become: true
  vars:
    k3s_version: "v1.34.4+k3s1"  # override with -e k3s_version=vX.Y.Z
  tasks:
    - name: Download k3s install script
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: "0755"

    - name: Upgrade k3s server
      ansible.builtin.command:
        cmd: >-
          /tmp/k3s-install.sh server
          --cluster-init
          --disable servicelb
      environment:
        INSTALL_K3S_VERSION: "{{ k3s_version }}"
      changed_when: true

- name: Upgrade k3s workers one at a time
  hosts: workers
  become: true
  serial: 1  # rolling upgrade — one worker at a time
  vars:
    k3s_version: "v1.34.5+k3s1"
    controlplane_ip: "{{ hostvars[groups['controlplane'][0]]['ansible_host'] }}"
  tasks:
    - name: Download k3s install script
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: "0755"

    - name: Upgrade k3s agent
      ansible.builtin.command:
        cmd: >-
          /tmp/k3s-install.sh agent
          --server https://{{ controlplane_ip }}:6443
          --token {{ hostvars[groups['controlplane'][0]]['k3s_server_token'] }}
      environment:
        INSTALL_K3S_VERSION: "{{ k3s_version }}"
      changed_when: true
